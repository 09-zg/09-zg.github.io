<!-- dist/index.html -->

<style>
/* ルート（index.htmlがある場所）から見たパス */
@import "dist/css1.css";
</style>

<div class="main-section">

<div id="ios-slider-base" class="ios-slider-base">
  <div id="ios-fill-horiz" class="ios-fill-horiz"></div>
  <div class="ios-icon-horiz">カードサイズ変更バー</div>
</div>
<div id="ios-label-horiz">列数: 2</div>


<div class="filter-menu">
  <!-- 1. フィルターボタン -->
  <button id="btn-all" class="active" onclick="window.site.toggleFilter('all')">ぜんぶ</button>
  <button id="btn-utau" onclick="window.site.toggleFilter('utau')">🎤 音源</button>
  <button id="btn-tool" onclick="window.site.toggleFilter('tool')">⚙️ ツール</button>
  <button id="btn-novel" onclick="window.site.toggleFilter('novel')">📖 創作</button>
  <button id="btn-chara" onclick="window.site.toggleFilter('chara')">キャラ</button>
</div>

<div id="container">読み込み中...</div>
</div>

<script>

// idx.js は触らず、このページ専用の関数を作る
function changeColumns(val) {
  const container = document.getElementById('container');
  const display = document.getElementById('col-val');
  
  if (container) {
    // 直接スタイルを上書きしちゃう（これが一番確実）
    container.style.display = 'grid';
    container.style.gridTemplateColumns = `repeat(${val}, 1fr)`;
    container.style.gap = val > 5 ? '4px' : '10px'; // 列が多い時は隙間を詰める
  }
  if (display) display.textContent = val;
}

// カード一覧だけを別ファイルから持ってくる
fetch('dist/list.html')
.then(r => r.text())
.then(html => {
document.getElementById('container').innerHTML = html;
// 読み込み直後はフィルタをリセットして全部表示させる
window.site.toggleFilter('all');
});

//◇

let lastX = 0;
let currentPercent = 0.2; // 初期値
const sensitivity = 7.5;
const sliderBase = document.getElementById('ios-slider-base');

// 共通の更新処理
function updateSlider(deltaX) {
  const rect = sliderBase.getBoundingClientRect();
  let deltaPercent = (deltaX / rect.width) * sensitivity;
  currentPercent = Math.min(Math.max(0, currentPercent + deltaPercent), 1);
  
  let cols = Math.ceil(currentPercent * 7) || 1;
  
  document.getElementById('ios-fill-horiz').style.width = (currentPercent * 100) + '%';
  document.getElementById('ios-label-horiz').textContent = `列数: ${cols}`;
  
  const container = document.getElementById('container');
  if (container) {
    container.style.display = 'grid';
    container.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    container.style.gap = cols > 5 ? '4px' : '10px';
    
    for (let item of container.children) {
      item.style.aspectRatio = '1 / 1';
      item.style.overflow = 'hidden';
    }
  }
}

// --- タッチ操作 (スマホ) ---
sliderBase.addEventListener('touchstart', (e) => {
  lastX = e.touches[0].clientX;
}, {passive: false});

sliderBase.addEventListener('touchmove', (e) => {
  e.preventDefault(); // スクロール禁止
  let deltaX = e.touches[0].clientX - lastX;
  lastX = e.touches[0].clientX;
  updateSlider(deltaX);
}, {passive: false});

// --- マウス操作 (PC) ---
sliderBase.addEventListener('mousedown', (e) => {
  lastX = e.clientX;
  
  const onMouseMove = (me) => {
    let deltaX = me.clientX - lastX;
    lastX = me.clientX;
    updateSlider(deltaX);
  };
  
  const onMouseUp = () => {
    window.removeEventListener('mousemove', onMouseMove);
    window.removeEventListener('mouseup', onMouseUp);
  };
  
  window.addEventListener('mousemove', onMouseMove);
  window.addEventListener('mouseup', onMouseUp);
});

</script>
