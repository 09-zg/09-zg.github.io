<!-- dist/index.html -->

<style>
/* ルート（index.htmlがある場所）から見たパス */
@import "dist/css1.css";
</style>

<div class="main-section">

<div id="ios-slider-base" class="ios-slider-base">
<div id="ios-fill-horiz" class="ios-fill-horiz"></div>
<div class="ios-icon-horiz">カードサイズ変更バー</div>
</div>
<div id="ios-label-horiz">列数: 2</div>


<div class="filter-menu">
<!-- 1. フィルターボタン -->
<button id="btn-all" class="active" onclick="window.site.toggleFilter('all')">ぜんぶ</button>
<button id="btn-utau" onclick="window.site.toggleFilter('utau')">🎤 音源</button>
<button id="btn-tool" onclick="window.site.toggleFilter('tool')">⚙️ ツール</button>
<button id="btn-novel" onclick="window.site.toggleFilter('novel')">📖 創作</button>
<button id="btn-chara" onclick="window.site.toggleFilter('chara')">キャラ</button>
</div>

<div id="container">読み込み中...</div>
</div>

<script>

(() => {
// --- 設定値（ここを変えると感度や初期値が変わる） ---
const config = {
sensitivity: 8.5,
maxCols: 7,
minCols: 1,
initialPercent: 0.8 // 0.8 = 約2列からスタート
};

let lastX = 0;
let currentPercent = config.initialPercent;
const sliderBase = document.getElementById('ios-slider-base');
const container = document.getElementById('container');
const label = document.getElementById('ios-label-horiz');
const fill = document.getElementById('ios-fill-horiz');

// 1. スライダー更新処理（向きを完全逆転）
const updateSlider = (deltaX) => {
const rect = sliderBase.getBoundingClientRect();
// 右に動かす(deltaXがプラス)と、%が減るように計算
let deltaPercent = (-deltaX / rect.width) * config.sensitivity;
currentPercent = Math.min(Math.max(0, currentPercent + deltaPercent), 1);

// %が 0 に近いほど 7列、1 に近いほど 1列 になるように逆転計算
let cols = Math.floor((1 - currentPercent) * config.maxCols) + 1;
cols = Math.min(Math.max(config.minCols, cols), config.maxCols);

// 見た目の反映
fill.style.width = (currentPercent * 100) + '%';
label.textContent = `列数: ${cols}`;

if (container) {
container.style.display = 'grid'; // 強制的にGridにする
container.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
container.style.gap = cols > 4 ? '4px' : '15px';
container.style.width = '100%';
}
};

// 2. イベントハンドラ（一本化）
const moveAction = (e) => {
const currentX = e.touches ? e.touches[0].clientX : e.clientX;
let deltaX = currentX - lastX;
lastX = currentX;
updateSlider(deltaX);
if (e.touches) e.preventDefault(); // スマホのスクロール防止
};

const endAction = () => {
window.removeEventListener('mousemove', moveAction);
window.removeEventListener('touchmove', moveAction);
};

const startAction = (e) => {
lastX = e.touches ? e.touches[0].clientX : e.clientX;
window.addEventListener('mousemove', moveAction);
window.addEventListener('touchmove', moveAction, { passive: false });
window.addEventListener('mouseup', endAction);
window.addEventListener('touchend', endAction);
};

// 3. 実行と初期化
sliderBase.addEventListener('mousedown', startAction);
sliderBase.addEventListener('touchstart', startAction, { passive: false });

// リストの読み込み
fetch('dist/list.html')
.then(r => r.text())
.then(html => {
container.innerHTML = html;
window.site.toggleFilter('all');
updateSlider(0); // 読み込み完了時に表示を整える
});

})(); // 全体を関数で囲ってカプセル化

</script>
