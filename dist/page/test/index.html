<script>
function logCount(type) {
// あなたのWitchServerのURLに書き換えてください
const url = 'https://09tool.witchserver.jp/3_data/log.php?type=' + type;

// navigator.sendBeaconを使うと、ページ移動中でも確実に送信してくれます（便利！）
if (navigator.sendBeacon) {
navigator.sendBeacon(url);
} else {
fetch(url, { mode: 'no-cors' });
}
}
</script>
