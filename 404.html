<!-- ルート直下の 404.html -->
<script>
  // 「エラーが起きた」という印と、どこから来たかをメモリに保存
  const path = window.location.pathname.split('/').pop() || '不明なページ';
  sessionStorage.setItem('error_flag', 'true');
  sessionStorage.setItem('error_from', path);

  // パラメータを付けずにトップページへ（これで404ループが止まります）
  location.replace("/");
</script>
